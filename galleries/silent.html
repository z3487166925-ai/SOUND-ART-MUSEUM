<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无声馆</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/gallery.css">
  <link rel="stylesheet" href="../css/silent.css">
</head>
<body data-hall="silent" class="page-gallery">
  <canvas id="bg-particles" aria-hidden="true"></canvas>
  <div class="page-vignette" aria-hidden="true"></div>
  <header class="site-header site-header--inner" id="site-header"></header>
  <main class="gallery-main">
    <section class="gallery-hero">
      <canvas id="gallery-hero-art" class="gallery-hero__art" aria-hidden="true"></canvas>
      <div class="gallery-hero__overlay">
        <a href="../index.html#exhibitions" class="gallery-back btn-glow" id="gallery-back">BACK</a>
        <p class="gallery-hero__label" id="gallery-label"></p>
        <h1 class="gallery-hero__title-zh" id="gallery-title-zh"></h1>
        <p class="gallery-hero__title-en" id="gallery-hero-en"></p>
        <span class="gallery-hero__line" aria-hidden="true"></span>
        <p class="gallery-hero__tag" id="gallery-tag"></p>
        <p class="gallery-hero__intro" id="gallery-intro"></p>
      </div>
    </section>
    <div id="silent-exhibit" class="silent-exhibit" aria-label="无声视觉展厅"></div>
    <section class="gallery-archive" hidden aria-hidden="true">
      <div id="track-list"></div>
    </section>
  </main>
  <button type="button" class="music-toggle btn-glow" id="music-toggle" aria-label="浏览展厅">
    <span class="music-toggle__ring"></span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
  </button>
  <script src="../js/data.js"></script>
  <script src="../js/hall-art.js"></script>
  <script src="../js/particles.js"></script>
  <script src="../js/reveal.js"></script>
  <script src="../js/gallery-shell.js"></script>
  <script src="../js/hall-switcher.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/silent-gallery.js"></script>
</body>
</html>
